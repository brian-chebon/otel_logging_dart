name: Publish to pub.dev

# Publishes whenever a tag like v1.2.3 is pushed. Uses pub.dev's automated
# publishing (OIDC) — no tokens or secrets required. Enable it on pub.dev under
# the package's Admin tab: set the repository to brian-chebon/otel_logging_dart
# and the tag pattern to v{{version}}.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    permissions:
      id-token: write # required for pub.dev OIDC authentication
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev
